<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div class="formulario_novo_produto" id="formulario_novo_produto">
      <form class="conteudo_form" id="form-novo-produto">
        <h1>Adicionar Novo Produto</h1>

        <div class="title">
          <label for="title"><b>Título</b></label>
          <input id="title" type="text" name="title" title="Título do Produto"
            placeholder="Introduza um título para o seu produto" id="title" required />
        </div>

        <div class="description">
          <label for="nome"><b>Descrição</b></label>
          <input id="description" type="text" name="description" title="Descrição do Produto"
            placeholder="Introduza a descrição do produto" required />
        </div>

        <div class="category">
          <label for="category"><b>Categoria</b></label>
          <select name="categoryId" id="category" title="Categoria do produto" required>
            <option value="" disabled selected>Selecione uma categoria</option>
            <!-- Categories will be loaded dynamically -->
          </select>
        </div>

        <div class="price">
          <label for="price"><b>Preço</b></label>
          <input id="price" type="number" name="price" step="0.01" min="0" placeholder="Introduza o preço de venda"
            required />
        </div>

        <div class="imageURL">
          <label for="imageURL"><b>URL da Imagem:</b></label>
          <input type="text" id="imageURL" placeholder="Cole o link da imagem aqui" required />
        </div>

        <div class="location">
          <label for="location"><b>Localização</b></label>
          <input id="location" type="text" placeholder="Em que zona do país é que se encontra?" required />
        </div>

        <button type="submit" class="btn" id="submitBtn">
          Submeter produto
        </button>
        <button type="button" class="btn cancel" id="newProductFormCancelBtn">Cancelar</button>
      </form>
    </div>
  </div>
</div>
